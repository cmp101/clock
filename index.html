<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trading Monitor</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #171d26;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --accent: #38bdf8;
            --open: #22c55e;
            --closed: #ef4444;
            --lunch: #f59e0b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { margin-bottom: 30px; text-align: center; }
        .header h1 { font-size: 1.2rem; font-weight: 400; color: var(--accent); letter-spacing: 2px; }

        .container { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 16px; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d3748;
        }

        .city-info { display: flex; flex-direction: column; }
        .name { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        .label { font-size: 0.75rem; color: var(--text-dim); }
        
        .time-info { text-align: right; }
        .time { font-family: 'Menlo', 'Courier New', monospace; font-size: 1.7rem; font-weight: 700; margin-bottom: 4px; }
        .status { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; }

        .status-open { background: rgba(34, 197, 94, 0.2); color: var(--open); }
        .status-closed { background: rgba(239, 68, 68, 0.2); color: var(--closed); }
        .status-lunch { background: rgba(245, 158, 11, 0.2); color: var(--lunch); }
    </style>
</head>
<body>

    <div class="header">
        <h1>TRADING CLOCK</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="city-info">
                <span class="name">香港 (HKEX)</span>
                <span class="label" id="date-hk">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-hk">00:00:00</div>
                <div id="status-hk" class="status">Checking...</div>
            </div>
        </div>

        <div class="card">
            <div class="city-info">
                <span class="name">纽约 (NYSE)</span>
                <span class="label" id="date-ny">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-ny">00:00:00</div>
                <div id="status-ny" class="status">Checking...</div>
            </div>
        </div>

        <div class="card">
            <div class="city-info">
                <span class="name">萨斯卡通 (Saskatoon)</span>
                <span class="label" id="date-sk">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-sk">00:00:00</div>
                <div class="label">Local Time</div>
            </div>
        </div>
    </div>

    <script>
        function getMarketStatus(zone, hour, min, day) {
            const isWeekend = (day === 'Sat' || day === 'Sun');
            const totalMin = hour * 60 + min;

            if (zone === 'HK') {
                if (isWeekend) return { text: 'CLOSED', class: 'status-closed' };
                // 港股: 09:30-12:00, 13:00-16:00
                if (totalMin >= 570 && totalMin < 720) return { text: 'MARKET OPEN', class: 'status-open' };
                if (totalMin >= 720 && totalMin < 780) return { text: 'LUNCH BREAK', class: 'status-lunch' };
                if (totalMin >= 780 && totalMin < 960) return { text: 'MARKET OPEN', class: 'status-open' };
                return { text: 'CLOSED', class: 'status-closed' };
            }

            if (zone === 'NY') {
                if (isWeekend) return { text: 'CLOSED', class: 'status-closed' };
                // 美股: 09:30-16:00
                if (totalMin >= 570 && totalMin < 960) return { text: 'MARKET OPEN', class: 'status-open' };
                return { text: 'CLOSED', class: 'status-closed' };
            }
        }

        function update() {
            const now = new Date();
            const config = [
                { id: 'hk', zone: 'Asia/Hong_Kong', market: 'HK' },
                { id: 'ny', zone: 'America/New_York', market: 'NY' },
                { id: 'sk', zone: 'America/Saskatchewan', market: null }
            ];

            config.forEach(item => {
                // 时间显示
                const timeStr = now.toLocaleTimeString('en-GB', { timeZone: item.zone, hour12: false });
                const dateStr = now.toLocaleDateString('en-US', { timeZone: item.zone, month: 'short', day: 'numeric', weekday: 'short' });
                document.getElementById(`time-${item.id}`).textContent = timeStr;
                document.getElementById(`date-${item.id}`).textContent = dateStr;

                // 交易状态显示
                if (item.market) {
                    const parts = new Intl.DateTimeFormat('en-US', {
                        timeZone: item.zone, hour: 'numeric', minute: 'numeric', hour12: false, weekday: 'short'
                    }).formatToParts(now);
                    const h = parseInt(parts.find(p => p.type === 'hour').value);
                    const m = parseInt(parts.find(p => p.type === 'minute').value);
                    const d = parts.find(p => p.type === 'weekday').value;

                    const status = getMarketStatus(item.market, h, m, d);
                    const el = document.getElementById(`status-${item.id}`);
                    el.textContent = status.text;
                    el.className = `status ${status.class}`;
                }
            });
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
