
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trading Dashboard</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/apple-watch.png">
    <style>
        :root {
            --bg-color: #080a0f;
            --card-bg: #121822;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --open: #22c55e;
            --closed: #ef4444;
            --lunch: #f59e0b;
            --countdown: #fbbf24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: calc(env(safe-area-inset-top) + 20px) 16px 40px 16px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { margin-bottom: 20px; border-bottom: 1px solid #1e293b; width: 100%; text-align: center; padding-bottom: 10px; }
        .header h1 { font-size: 0.9rem; letter-spacing: 3px; color: var(--text-dim); margin: 0; }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        .card {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #1e293b;
        }

        .city-info { display: flex; flex-direction: column; }
        .name { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        .label { font-size: 0.7rem; color: var(--text-dim); }
        
        .time-info { text-align: right; }
        .time { font-family: 'SF Mono', 'Menlo', monospace; font-size: 1.6rem; font-weight: 700; }
        .status-row { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-top: 5px; }
        .status { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; display: inline-block; }

        .status-open { background: rgba(34, 197, 94, 0.15); color: var(--open); }
        .status-closed { background: rgba(239, 68, 68, 0.15); color: var(--closed); }
        .status-lunch { background: rgba(245, 158, 11, 0.15); color: var(--lunch); }
        
        .countdown { font-size: 0.7rem; color: var(--countdown); font-weight: 500; }
    </style>
</head>
<body>

    <div class="header"><h1>TRADING DASHBOARD</h1></div>

    <div class="container">
        <div class="card">
            <div class="city-info">
                <span class="name">首尔 (KOSPI 200)</span>
                <span class="label" id="date-kr">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-kr">00:00:00</div>
                <div class="status-row">
                    <div id="status-kr" class="status">Checking...</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="city-info">
                <span class="name">香港 (HKEX)</span>
                <span class="label" id="date-hk">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-hk">00:00:00</div>
                <div class="status-row">
                    <div id="status-hk" class="status">Checking...</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="city-info">
                <span class="name">纽约 (NYSE/CME)</span>
                <span class="label" id="date-ny">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-ny">00:00:00</div>
                <div class="status-row">
                    <div id="status-ny" class="status">Checking...</div>
                    <div id="countdown-ny" class="countdown"></div>
                </div>
            </div>
        </div>

        <div class="card" style="border-left: 4px solid var(--accent);">
            <div class="city-info">
                <span class="name">萨斯卡通 (Local)</span>
                <span class="label" id="date-sk">---</span>
            </div>
            <div class="time-info">
                <div class="time" id="time-sk">00:00:00</div>
                <div class="label" style="font-size: 0.65rem; margin-top:5px;">System Local Time</div>
            </div>
        </div>
    </div>

    <script>
        function getStatus(market, h, m, d) {
            const isWknd = (d === 'Sat' || d === 'Sun');
            const min = h * 60 + m;

            if (market === 'KR') {
                if (isWknd) return { text: 'CLOSED', class: 'status-closed' };
                return (min >= 540 && min < 945) ? { text: 'MARKET OPEN', class: 'status-open' } : { text: 'CLOSED', class: 'status-closed' };
            }
            if (market === 'HK') {
                if (isWknd) return { text: 'CLOSED', class: 'status-closed' };
                if (min >= 570 && min < 720) return { text: 'OPEN', class: 'status-open' };
                if (min >= 720 && min < 780) return { text: 'LUNCH', class: 'status-lunch' };
                if (min >= 780 && min < 960) return { text: 'OPEN', class: 'status-open' };
                return { text: 'CLOSED', class: 'status-closed' };
            }
            if (market === 'NY') {
                if (isWknd) return { text: 'CLOSED', class: 'status-closed' };
                return (min >= 570 && min < 960) ? { text: 'MARKET OPEN', class: 'status-open' } : { text: 'CLOSED', class: 'status-closed' };
            }
        }

        function update() {
            const now = new Date();
            
            // 更新萨斯卡通 (本地)
            document.getElementById('time-sk').textContent = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('date-sk').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });

            const config = [
                { id: 'kr', z: 'Asia/Seoul', m: 'KR' },
                { id: 'hk', z: 'Asia/Hong_Kong', m: 'HK' },
                { id: 'ny', z: 'America/New_York', m: 'NY' }
            ];

            config.forEach(cfg => {
                try {
                    const formatter = new Intl.DateTimeFormat('en-US', {
                        timeZone: cfg.z, hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false, weekday: 'short', month: 'short', day: 'numeric'
                    });
                    const parts = formatter.formatToParts(now);
                    const h = parseInt(parts.find(p => p.type === 'hour').value);
                    const m = parseInt(parts.find(p => p.type === 'minute').value);
                    const s = parseInt(parts.find(p => p.type === 'second').value);
                    const d = parts.find(p => p.type === 'weekday').value;
                    
                    document.getElementById(`time-${cfg.id}`).textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    document.getElementById(`date-${cfg.id}`).textContent = `${parts.find(p => p.type === 'weekday').value}, ${parts.find(p => p.type === 'month').value} ${parts.find(p => p.type === 'day').value}`;

                    const status = getStatus(cfg.m, h, m, d);
                    const statusEl = document.getElementById(`status-${cfg.id}`);
                    statusEl.textContent = status.text; 
                    statusEl.className = `status ${status.class}`;

                    // 纽约收盘倒计时逻辑
                    if (cfg.id === 'ny') {
                        const countdownEl = document.getElementById('countdown-ny');
                        const totalMin = h * 60 + m;
                        // 如果在 9:30 和 16:00 之间且不是周末
                        if (totalMin >= 570 && totalMin < 960 && d !== 'Sat' && d !== 'Sun') {
                            const remainSeconds = (16 * 3600) - (h * 3600 + m * 60 + s);
                            const rh = Math.floor(remainSeconds / 3600);
                            const rm = Math.floor((remainSeconds % 3600) / 60);
                            const rs = remainSeconds % 60;
                            countdownEl.textContent = `Closing in: ${rh}h ${rm}m ${rs}s`;
                        } else {
                            countdownEl.textContent = "";
                        }
                    }
                } catch (e) { console.error(e); }
            });
        }
        setInterval(update, 1000); 
        update();
    </script>
</body>
</html>
